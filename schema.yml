openapi: 3.0.3
info:
  title: CEMLAD Learning API
  version: 1.0.0
  description: Documentación de la API de aprendizaje CEMLAD
paths:
  /:
    get:
      operationId: root_retrieve
      description: |-
        Welcome endpoint for CEMLAD API.

        Returns a welcome message to verify API is running.
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
  /carts:
    get:
      operationId: carts_list
      description: Retrieve all shopping carts
      tags:
      - carts
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cart'
          description: ''
    post:
      operationId: carts_create
      description: Create a new shopping cart
      tags:
      - carts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cart'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cart'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cart'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /carts/{cart_id}:
    get:
      operationId: carts_retrieve
      description: Retrieve a specific cart by ID
      parameters:
      - in: path
        name: cart_id
        schema:
          type: integer
        required: true
      tags:
      - carts
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /carts/{cart_id}/pay:
    post:
      operationId: carts_pay_create
      description: Procesar el pago de un carrito
      parameters:
      - in: path
        name: cart_id
        schema:
          type: integer
        required: true
      tags:
      - carts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartPay'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CartPay'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CartPay'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
          description: ''
  /carts/{cart_id}/products:
    post:
      operationId: carts_products_create
      description: Add a product to a cart
      parameters:
      - in: path
        name: cart_id
        schema:
          type: integer
        required: true
      tags:
      - carts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartAddProduct'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CartAddProduct'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CartAddProduct'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /carts/{cart_id}/products/{product_id}:
    delete:
      operationId: carts_products_destroy
      description: Remove a product from a cart
      parameters:
      - in: path
        name: cart_id
        schema:
          type: integer
        required: true
      - in: path
        name: product_id
        schema:
          type: integer
        required: true
      tags:
      - carts
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
          description: ''
  /products:
    get:
      operationId: products_list
      description: Retrieve all products
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
          description: ''
    post:
      operationId: products_create
      description: Create a new product
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Product'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Product'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /products/{product_id}:
    get:
      operationId: products_retrieve
      description: Retrieve a product by ID
      parameters:
      - in: path
        name: product_id
        schema:
          type: integer
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
    put:
      operationId: products_update
      description: Update a product
      parameters:
      - in: path
        name: product_id
        schema:
          type: integer
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Product'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Product'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
    patch:
      operationId: products_partial_update
      description: Update a product
      parameters:
      - in: path
        name: product_id
        schema:
          type: integer
        required: true
      tags:
      - products
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProduct'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProduct'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProduct'
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
    delete:
      operationId: products_destroy
      description: Delete a product
      parameters:
      - in: path
        name: product_id
        schema:
          type: integer
        required: true
      tags:
      - products
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '204':
          description: No response body
components:
  schemas:
    Cart:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        customer_id:
          type: integer
        status:
          type: string
          maxLength: 10
        total:
          type: number
          format: double
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
          readOnly: true
      required:
      - customer_id
      - id
      - products
      - status
      - total
    CartAddProduct:
      type: object
      properties:
        product_id:
          type: integer
      required:
      - product_id
    CartPay:
      type: object
      properties:
        payment_method:
          $ref: '#/components/schemas/PaymentMethodEnum'
      required:
      - payment_method
    PatchedProduct:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        code:
          type: string
          maxLength: 50
        price:
          type: number
          format: double
    PaymentMethodEnum:
      enum:
      - CASH
      - CARD
      type: string
      description: |-
        * `CASH` - CASH
        * `CARD` - CARD
    PaymentResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        code:
          type: string
          maxLength: 50
        price:
          type: number
          format: double
      required:
      - code
      - id
      - name
      - price
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
